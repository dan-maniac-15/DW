<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#111111" />
  <title>Reader</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />

  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
</head>
<body>
  <header class="topbar">
    <button class="icon" id="btnMenu" aria-label="メニュー">☰</button>
    <div class="title">Reader</div>
    
    <div class="spacer"></div>
    
    <button class="chip" id="btnPrev" title="前の章">←</button>
    <button class="chip" id="btnNext" title="次の章">→</button>

    <button class="chip" id="btnRead">🔊</button>
    <button class="chip" id="btnStop">⏹</button>

    <button class="chip" id="btnTheme" title="テーマ切替">🌓</button>
    <button class="chip" id="btnWritingMode" title="縦書き/横書き">縦</button>
    <button class="chip" id="btnBookmark" title="しおり">★</button>
  </header>


  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawerHeader">
      <div class="drawerTitle">目次 / 設定</div>
      <button class="icon" id="btnClose" aria-label="閉じる">✕</button>
    </div>

    <div class="section">
      <label class="label">検索</label>
      <input id="searchInput" class="input" type="search" placeholder="本文を検索（Enter）" />
      <div id="searchStatus" class="hint"></div>
      <div id="searchResults" class="results"></div>
    </div>

    <div class="section">
      <label class="label">表示</label>

      <div class="controlRow">
        <span>文字サイズ</span>
        <div class="controls">
          <button class="btn" id="fontMinus">−</button>
          <span class="value" id="fontValue"></span>
          <button class="btn" id="fontPlus">＋</button>
        </div>
      </div>

      <div class="controlRow">
        <span>行間</span>
        <div class="controls">
          <button class="btn" id="lhMinus">−</button>
          <span class="value" id="lhValue"></span>
          <button class="btn" id="lhPlus">＋</button>
        </div>
      </div>

      <div class="hint">
        ※ 縦書きは端末・ブラウザにより字間や禁則が不安定な場合があります。
      </div>
    </div>

    <div class="section">
      <label class="label">目次</label>
      <nav id="toc" class="toc"></nav>
    </div>

    <div class="section">
      <label class="label">しおり</label>
      <div id="bookmarks" class="bookmarks"></div>
      <button class="btn wide" id="clearBookmarks">しおりを全削除</button>
    </div>

    <div class="section">
      <label class="label">オフライン</label>
      <div class="hint" id="offlineHint"></div>
      <button class="btn wide" id="btnUpdateCache">キャッシュ更新</button>
    </div>
  </aside>

  <main id="main" class="main">
    <article id="content" class="content" tabindex="0" aria-label="本文"></article>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="./app.js"></script>
</body>
</html>
